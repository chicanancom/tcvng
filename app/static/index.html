<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Form Management</h1>
            <p>Chọn một form bên dưới để bắt đầu điền thông tin</p>
        </header>

        <main>
            <div id="form-list-section" class="glass-card">
                <h3>Danh sách Form hiện có</h3>
                <div id="form-list" class="grid-list">
                    <!-- Forms will be loaded here -->
                    <div class="loader">Đang tải...</div>
                </div>
            </div>

            <div id="form-detail-section" class="glass-card hidden">
                <button id="back-btn" class="btn-secondary">← Quay lại</button>
                <h2 id="current-form-title">Tên Form</h2>
                <p id="current-form-desc">Mô tả</p>
                
                <form id="submission-form">
                    <div id="fields-container">
                        <!-- Fields will be injected here -->
                    </div>
                    <div id="error-container" class="error-box hidden"></div>
                    <button type="submit" class="btn-primary">Gửi thông tin</button>
                </form>
            </div>
            
            <div id="success-section" class="glass-card hidden">
                <div class="success-icon">✓</div>
                <h2>Gửi thành công!</h2>
                <p>Cảm ơn bạn đã hoàn thành form này.</p>
                <button onclick="location.reload()" class="btn-primary">Về trang chủ</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
